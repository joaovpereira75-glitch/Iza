    <script>
        // Contador
        function atualizarContador() {
            const dataInicio = new Date('2025-02-10T00:00:00');
            const agora = new Date();
            const totalDias = Math.floor((agora - dataInicio) / (1000 * 60 * 60 * 24));
            document.getElementById('dias').innerText = totalDias > 0 ? totalDias : 0;
        }

        // Carrossel
        let currentPositions = [0, 0, 0];
        function moveSlide(trackIndex, direction) {
            const track = document.getElementById('track' + trackIndex);
            const totalSlides = track.children.length;
            currentPositions[trackIndex] = (currentPositions[trackIndex] + direction + totalSlides) % totalSlides;
            track.style.transform = `translateX(-${currentPositions[trackIndex] * 100}%)`;
        }

        // --- FUNÇÕES DE ADICIONAR FOTO ---
        function triggerInput(index) {
            document.getElementById('input' + index).click();
        }

        function addPhoto(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const track = document.getElementById('track' + index);
                    
                    // Cria novo slide
                    const newSlide = document.createElement('div');
                    newSlide.className = 'slide';
                    newSlide.innerHTML = `<img src="${e.target.result}">`;
                    
                    track.appendChild(newSlide);
                    
                    // Move para a foto nova automaticamente
                    moveSlide(index, track.children.length - 1);
                }
                reader.readAsDataURL(file);
            }
        }

        atualizarContador();
    </script>
